<!DOCTYPE html>
<html>

<head>
    <title>Lead Payment Test</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body style="font-family: Arial; padding: 40px;">

    <h2>Lead Payment Test</h2>

    <input type="text" id="leadId" placeholder="Enter Lead ID" /><br><br>

    <select id="stage">
        <option value="ADVANCE">Advance</option>
        <option value="FINAL">Final</option>
    </select><br><br>

    <input type="number" id="amount" placeholder="Enter amount" /><br><br>

    <button onclick="payNow()">Pay Now</button>

    <script>
        async function payNow() {
            const leadId = document.getElementById("leadId").value;
            const amount = document.getElementById("amount").value;
            const stage = document.getElementById("stage").value;

            if (!leadId) {
                alert("Enter leadId");
                return;
            }

            if (!amount || amount <= 0) {
                alert("Enter valid amount");
                return;
            }

            // 🔥 Step 1: Create Lead Payment Order
            const orderRes = await fetch("http://localhost:4001/payment/lead/createLeadOrder", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY5ZDZhYzJkNWNlOTg0ZWVmZDIyYWMyOCIsImlhdCI6MTc3NTY3NjUxNywiZXhwIjoxNzc1NzYyOTE3LCJpc3MiOiJkb2NrZXIuZGV2LnNpcmFqIn0.XRg8r0GFav4ZkTUvhvuwayXRADDTU1g3taRV5F5qFFg"
                },
                body: JSON.stringify({
                    leadId,
                    amount,
                    stage
                })
            });

            const orderData = await orderRes.json();

            console.log("Order:", orderData);

            // 🔥 Step 2: Razorpay Checkout
            const options = {
                key: "rzp_test_SaXKaNzMLEaXTh",
                amount: orderData.data.amount,
                currency: "INR",
                name: "Lead Payment",
                description: `${stage} Payment`,
                order_id: orderData.data.id,

                handler: async function (response) {
                    console.log("Payment Success:", response);

                    // 🔥 Step 3: Verify Payment
                    const verifyRes = await fetch("http://localhost:4001/payment/lead/verifyLead", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY5ZDZhYzJkNWNlOTg0ZWVmZDIyYWMyOCIsImlhdCI6MTc3NTY3NjUxNywiZXhwIjoxNzc1NzYyOTE3LCJpc3MiOiJkb2NrZXIuZGV2LnNpcmFqIn0.XRg8r0GFav4ZkTUvhvuwayXRADDTU1g3taRV5F5qFFg"
                        },
                        body: JSON.stringify(response)
                    });

                    const verifyData = await verifyRes.json();

                    console.log("Verify Response:", verifyData);

                    alert("Payment Successful & Lead Updated");
                },

                prefill: {
                    name: "Test User",
                    email: "test@test.com",
                    contact: "9999999999"
                },

                theme: {
                    color: "#3399cc"
                }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        }
    </script>

</body>

</html>
